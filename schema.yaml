  /api/surveys/{id}/responses/:
    post:
      operationId: surveys_responses_create
      description: 'Posts a full response with one answer per question. Only `active`
        surveys accept submissions. For non-anonymous surveys a given user can only
        submit once; anonymous surveys allow unlimited submissions. Payload shape:
        `{ "answers": [{ "question_id": int, "value": str }, ...] }`.'
      summary: Submit a response to a survey
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Survey.
        required: true
      tags:
      - Feedback & Surveys
      requestBody:
        content:
          type:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
          properties:
            schema:
              answers:
                type: array
                items:
                  type: object
                  properties:
                    question_id:
                      type: integer
                    value:
                      type: string
                  required:
                  - question_id
          required:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  survey:
                    type: integer
                  submitted_at:
                    type: string
                    format: date-time
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
