openapi: 3.0.3
info:
  title: BloomHub Backend API
  version: 1.0.0
  description: BloomHub internal HR platform API. Auth via JWT (login/register, then
    Bearer token).
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: List of available API endpoints.
      tags:
      - API Root
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIRootResponse'
          description: ''
  /api/admin/upload-role-permissions/:
    post:
      operationId: admin_upload_role_permissions_create
      description: 'Upload a CSV to set role permissions. Staff/superuser only. CSV:
        role_id, module_name, feature_action, permission (YES/NO), operation_type
        (override/add/remove/merge).'
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadRolePermissionsResponse'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/ai/chat/:
    post:
      operationId: ai_chat_create
      tags:
      - AI
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AIChatRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AIChatRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/ai/chat/capabilities/:
    get:
      operationId: ai_chat_capabilities_retrieve
      tags:
      - AI
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/ai/chat/sessions/:
    get:
      operationId: ai_chat_sessions_list
      tags:
      - AI
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIChatSession'
          description: ''
  /api/ai/chat/sessions/{id}/:
    get:
      operationId: ai_chat_sessions_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - AI
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIChatSessionDetail'
          description: ''
    delete:
      operationId: ai_chat_sessions_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - AI
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/ai/chat/tool-coverage/:
    get:
      operationId: ai_chat_tool_coverage_retrieve
      description: |-
        Per-module tool coverage report.

        Lighter than `/capabilities/` (no full args schemas) — meant for
        dashboards / admin views that just want "how many tools per module".
      tags:
      - AI
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/announcement-discord-channels/:
    get:
      operationId: announcement_discord_channels_list
      parameters:
      - in: query
        name: announcement_type
        schema:
          type: string
          enum:
          - celebration
          - general
          - news
          - urgent
        description: |-
          * `general` - General
          * `news` - News
          * `celebration` - Celebration
          * `urgent` - Urgent
      - in: query
        name: enabled
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DiscordAnnouncementChannel'
          description: ''
    post:
      operationId: announcement_discord_channels_create
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordAnnouncementChannel'
          description: ''
  /api/announcement-discord-channels/{id}/:
    get:
      operationId: announcement_discord_channels_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Discord Announcement
          Channel.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordAnnouncementChannel'
          description: ''
    put:
      operationId: announcement_discord_channels_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Discord Announcement
          Channel.
        required: true
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscordAnnouncementChannelRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordAnnouncementChannel'
          description: ''
    patch:
      operationId: announcement_discord_channels_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Discord Announcement
          Channel.
        required: true
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDiscordAnnouncementChannelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDiscordAnnouncementChannelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDiscordAnnouncementChannelRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordAnnouncementChannel'
          description: ''
    delete:
      operationId: announcement_discord_channels_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Discord Announcement
          Channel.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/announcements/:
    get:
      operationId: announcements_list
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          enum:
          - celebration
          - general
          - news
          - urgent
        description: |-
          * `general` - General
          * `news` - News
          * `celebration` - Celebration
          * `urgent` - Urgent
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnnouncementList'
          description: ''
    post:
      operationId: announcements_create
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementWrite'
          description: ''
  /api/announcements/{id}/:
    get:
      operationId: announcements_retrieve
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementDetail'
          description: ''
    put:
      operationId: announcements_update
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AnnouncementWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementWrite'
          description: ''
    patch:
      operationId: announcements_partial_update
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAnnouncementWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAnnouncementWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAnnouncementWriteRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementWrite'
          description: ''
    delete:
      operationId: announcements_destroy
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/announcements/{id}/comments/:
    get:
      operationId: announcements_comments_retrieve
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementList'
          description: ''
    post:
      operationId: announcements_comments_create
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementList'
          description: ''
  /api/announcements/{id}/comments/{comment_id}/:
    delete:
      operationId: announcements_comments_destroy
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: comment_id
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/announcements/{id}/reactions/:
    get:
      operationId: announcements_reactions_retrieve
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementList'
          description: ''
    post:
      operationId: announcements_reactions_create
      description: |-
        CRUD API for rich-text announcements.

        Scheduled announcements are hidden from regular readers until
        ``scheduled_at`` is due. Announcement managers can see future rows.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Announcement.
        required: true
      tags:
      - Announcements
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementList'
          description: ''
  /api/assets/:
    get:
      operationId: assets_list
      description: Get list of all assets with filtering options
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: category
        schema:
          type: string
        description: Filter by asset category (laptops, phones, monitors, headphones,
          cameras, vehicles, furniture, other)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, maintenance, retired, lost, returned,
          damaged)
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
          description: ''
    post:
      operationId: assets_create
      description: Create a new asset
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: category
        schema:
          type: string
        description: Filter by asset category (laptops, phones, monitors, headphones,
          cameras, vehicles, furniture, other)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, maintenance, retired, lost, returned,
          damaged)
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
  /api/assets/{id}/:
    get:
      operationId: assets_retrieve
      description: Get a specific asset by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assets_update
      description: Update an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    patch:
      operationId: assets_partial_update
      description: Partially update an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssetCreateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assets_destroy
      description: Delete an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assets/{id}/qr-code/:
    get:
      operationId: assets_qr_code_retrieve
      description: Download the stored PNG QR code for an asset.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '403':
          description: No response body
        '404':
          description: No response body
  /api/assets/capabilities/:
    get:
      operationId: assets_capabilities_retrieve
      description: Return canonical asset permissions and UI capabilities for the
        current user.
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/assets/export/:
    post:
      operationId: assets_export_create
      description: Export assets as CSV. Requires `export_inventory` permission. Supports
        optional filters and optional assignment columns.
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetExportRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetExportRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetExportRequestRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assignments/:
    get:
      operationId: assignments_list
      description: Get list of all assignments with filtering options
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
          description: ''
    post:
      operationId: assignments_create
      description: Create a new assignment (HR / designated roles only). `assigned_by`
        is set automatically to the authenticated user.
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assignments/{id}/:
    get:
      operationId: assignments_retrieve
      description: Get a specific assignment by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '404':
          description: No response body
