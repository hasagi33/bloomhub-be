components:
  schemas:
    APIRootResponse:
      type: object
      description: Response shape for GET /api/.
      properties:
        message:
          type: string
        endpoints:
          description: Nested map of endpoint names to paths or options.
      required:
      - endpoints
      - message
    Asset:
      type: object
      description: Serializer for Asset model
      properties:
        id:
          type: integer
          readOnly: true
        asset_id:
          type: string
          description: Unique identifier for the asset
          maxLength: 50
        name:
          type: string
          description: Asset name/type
          maxLength: 200
        condition:
          allOf:
          - $ref: '#/components/schemas/ConditionEnum'
          description: |-
            Current condition of the asset

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
        warranty_until:
          type: string
          format: date
          nullable: true
          description: Warranty expiration date
        purchase_date:
          type: string
          format: date
          description: Date when the asset was purchased
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          description: |-
            Current status of the asset

            * `active` - Active
            * `lost` - Lost
            * `returned` - Returned
            * `damaged` - Damaged
        serial_number:
          type: string
          nullable: true
          description: Manufacturer serial number
          maxLength: 100
        model:
          type: string
          nullable: true
          description: Asset model
          maxLength: 100
        manufacturer:
          type: string
          nullable: true
          description: Asset manufacturer
          maxLength: 100
        purchase_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Purchase price of the asset
        description:
          type: string
          nullable: true
          description: Additional description or notes
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        current_assignment:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        is_under_warranty:
          type: boolean
          readOnly: true
        is_available:
          type: boolean
          readOnly: true
      required:
      - asset_id
      - created_at
      - current_assignment
      - id
      - is_available
      - is_under_warranty
      - name
      - purchase_date
      - updated_at
    AssetCreateRequest:
