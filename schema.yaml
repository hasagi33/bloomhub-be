openapi: 3.0.3
info:
  title: BloomHub Backend API
  version: 1.0.0
  description: BloomHub internal HR platform API. Auth via JWT (login/register, then
    Bearer token).
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: List of available API endpoints.
      tags:
      - API Root
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIRootResponse'
          description: ''
  /api/admin/upload-role-permissions/:
    post:
      operationId: admin_upload_role_permissions_create
      description: 'Upload a CSV to set role permissions. Staff/superuser only. CSV:
        role_id, module_name, feature_action, permission (YES/NO), operation_type
        (override/add/remove/merge).'
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadRolePermissionsResponse'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assets/:
    get:
      operationId: assets_list
      description: Get list of all assets with filtering options
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, lost, returned, damaged)
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
          description: ''
    post:
      operationId: assets_create
      description: Create a new asset
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, lost, returned, damaged)
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
  /api/assets/{id}/:
    get:
      operationId: assets_retrieve
      description: Get a specific asset by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assets_update
      description: Update an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assets_destroy
      description: Delete an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/:
    get:
      operationId: assignments_list
      description: Get list of all assignments with filtering options
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
          description: ''
    post:
      operationId: assignments_create
      description: Create a new assignment (HR / designated roles only). `assigned_by`
        is set automatically to the authenticated user.
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assignments/{id}/:
    get:
      operationId: assignments_retrieve
      description: Get a specific assignment by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assignments_update
      description: Update an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assignments_destroy
      description: Delete an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/{id}/return/:
    post:
      operationId: assignments_return_create
      description: Return an assigned asset (mark as returned and set condition)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
  /api/auth/google/exchange/:
    post:
      operationId: auth_google_exchange_create
      description: Exchange a Google ID token for native JWT access/refresh tokens.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Login with email and password. Returns JWT refresh, access, and
        user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: 'Blacklist the refresh token. Send JSON: { "refresh": "<refresh_token>"
        }.'
      tags:
      - Auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '205':
          description: No response body
        '400':
          description: No response body
  /api/auth/permissions/:
    get:
      operationId: auth_permissions_retrieve
      description: Get current user's permissions based on bearer token. Returns permission
        list with module_name and feature_action.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                  username:
                    type: string
                  role:
                    type: string
                    nullable: true
                  permissions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        module_name:
                          type: string
                        feature_action:
                          type: string
                        bit_position:
                          type: integer
                  total_permissions:
                    type: integer
          description: ''
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: Get current authenticated user profile. Requires Bearer token.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/profile/avatar/:
    post:
      operationId: auth_profile_avatar_create
      description: Upload a new avatar for the current user. Accepts multipart/form-data
        with an `avatar` image file (max 5 MB). Stores the file via the configured
        storage backend (Cloudflare R2 when credentials are set). Returns the updated
        user object including the new `avatar_url`.
      tags:
      - Auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: 'Refresh access token. Send JSON: { "refresh": "<refresh_token>"
        }. Returns new access + user.'
      tags:
      - Auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Register a new user. Returns JWT refresh, access, and user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
  /api/auth/session/:
    get:
      operationId: auth_session_retrieve
      description: Get current session information including user profile and permissions.
        Requires Bearer token.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/cpf-levels/:
    get:
      operationId: cpf_levels_retrieve
      description: Get CPF levels, optionally filtered by role
      tags:
      - cpf-levels
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPFLevelListResponse'
          description: ''
  /api/cpf-levels/{role}/:
    get:
      operationId: cpf_levels_retrieve_2
      description: Get CPF levels, optionally filtered by role
      parameters:
      - in: path
        name: role
        schema:
          type: string
        required: true
      tags:
      - cpf-levels
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPFLevelListResponse'
          description: ''
  /api/departments/:
    get:
      operationId: departments_retrieve
      description: Get all unique departments
      tags:
      - departments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentListResponse'
          description: ''
  /api/employees/:
    get:
      operationId: employees_list
      description: Returns all profiles for HR/Admin; non-admin users only see their
        own. Supports filtering, search, and ordering via query parameters.
      summary: List employee profiles
      parameters:
      - in: query
        name: department
        schema:
          type: string
        description: Exact match on department.
      - in: query
        name: employment_status
        schema:
          type: string
        description: Exact match on employment status (e.g. active, inactive).
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active flag.
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Order results. Prefix with `-` for descending. Allowed: full_name,
          start_date, created_at.'
      - in: query
        name: role__name
        schema:
          type: string
        description: Exact match on related role name.
      - in: query
        name: search
        schema:
          type: string
        description: Search across full name, email, username, and employee id (full_name,
          email_address, user__username, employee_id).
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeProfile'
          description: ''
    post:
      operationId: employees_create
      description: Creates a `User` and linked `UserProfile`. HR/Admin only. A random
        password is generated server-side for the new account.
      summary: Create employee profile
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/employees/{employee_id}/profile-change-history/:
    get:
      operationId: employees_profile_change_history_list
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeProfileChangeHistory'
          description: ''
  /api/employees/{employee_id}/tech-leads/:
    get:
      operationId: employees_tech_leads_retrieve
      description: |-
        Get tech leads for a specific employee based on their project assignments.
        Returns list of tech leads with their associated project names.
        Format: "John Doe (Project Name)"

        If employee is tech lead level, returns CTO info instead.
      parameters:
      - in: path
        name: employee_id
        schema:
          type: integer
        required: true
      tags:
      - employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeTechLeadsResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/employees/{id}/:
    get:
      operationId: employees_retrieve
      description: Fetch one profile by id. HR/Admin any id; others only their own.
      summary: Retrieve employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '403':
          description: No response body
        '404':
          description: No response body
    put:
      operationId: employees_update
      description: Full update (PUT). HR/Admin can edit any profile; others read-only.
      summary: Replace employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
    patch:
      operationId: employees_partial_update
      description: Partial update (PATCH). Same permission rules as PUT.
      summary: Patch employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: employees_destroy
      description: Does not remove the profile row. Deletes avatar and document files,
        removes related assignments and salary rows, clears PII, marks the profile
        inactive, and anonymizes plus deactivates the linked Django `User`. HR/Admin
        only for arbitrary profiles.
      summary: Soft-delete employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
  /api/employees/{id}/bulk-update/:
    patch:
      operationId: employees_bulk_update_partial_update
      description: Update multiple employee fields in a single request. Accepts any
        combination of editable fields (first_name, last_name, full_name, email_address,
        department, role, managers, start_date, hire_date, phone_number, address,
        employment_status, emergency_contact_name, emergency_contact_phone, birthday,
        career_level, cpf_level, tech_tags, avatar, avatar_url). Requires 'Employee
        Profiles / update_any_profile' permission.
      summary: Bulk update employee profile fields
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
        '403':
          description: No response body
  /api/employees/{id}/cvs/:
    get:
      operationId: employees_cvs_retrieve
      description: |-
        CRUD endpoints for employee profiles.
        Permissions: HR/Admin can fully manage. Employees can do read-only operations on their own profile.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
    post:
      operationId: employees_cvs_create
      description: |-
        CRUD endpoints for employee profiles.
        Permissions: HR/Admin can fully manage. Employees can do read-only operations on their own profile.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
