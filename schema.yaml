  /api/job-applications/:
    get:
      operationId: job_applications_list
      description: |-
        Endpoints over the ``Application`` model.

        * ``list`` / ``retrieve`` — HR/admin see every application; an applicant
          sees only their own. ``?listing=<id>`` and ``?status=<value>`` filter.
        * ``update`` / ``partial_update`` — reviewer-driven status transitions
          (HR/admin, the listing creator, or a manager of an employee in the
          hiring department). State machine in
          ``core.services.job_application_service`` enforces legal moves.
        * ``withdraw`` action — applicant-only self-withdrawal.
      parameters:
      - in: query
        name: listing
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - accepted
          - rejected
          - shortlisted
          - submitted
          - under_review
          - withdrawn
        description: |-
          Current status of the application

          * `submitted` - Submitted
          * `under_review` - Under Review
          * `shortlisted` - Shortlisted
          * `rejected` - Rejected
          * `withdrawn` - Withdrawn
          * `accepted` - Accepted
      tags:
      - Internal Mobility
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
          description: ''
