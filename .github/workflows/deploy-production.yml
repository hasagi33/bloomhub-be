# Deploy to PROD only when you run it manually (Actions → Deploy Production → Run workflow)
name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    name: Migrate and deploy to production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub deployment record
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: production
          environment-url: ${{ secrets.PROD_ENVIRONMENT_URL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: python manage.py migrate --noinput

      - name: Deploy to production
        env:
          PROD_DEPLOY_WEBHOOK: ${{ secrets.PROD_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$PROD_DEPLOY_WEBHOOK" ]; then
            echo "Triggering production deploy via webhook..."
            curl -fsS -X POST "$PROD_DEPLOY_WEBHOOK"
          else
            echo "PROD_DEPLOY_WEBHOOK not set. Add it in repo Secrets (or production environment secrets) with your Render production Deploy Hook URL."
          fi

      - name: Update deployment status
        if: always() && steps.deployment.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: ${{ job.status }}
