# Deploy to DEV when main changes (push/merge to main).
# Intentionally does not use GitHub environment: dev so this is never a PR merge requirement.
name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    name: Migrate and deploy to dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (dev)
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DEV_PUBLIC_DOMAIN: ${{ secrets.DEV_PUBLIC_DOMAIN }}
        run: |
          python manage.py migrate_schemas --shared --noinput
          if [ -n "$DEV_PUBLIC_DOMAIN" ]; then
            python manage.py setup_public_tenant --domain "$DEV_PUBLIC_DOMAIN"
          else
            python manage.py setup_public_tenant
          fi

      - name: Deploy to dev
        env:
          DEV_DEPLOY_WEBHOOK: ${{ secrets.DEV_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$DEV_DEPLOY_WEBHOOK" ]; then
            echo "Triggering dev deploy via webhook..."
            curl -fsS -X POST "$DEV_DEPLOY_WEBHOOK"
          else
            echo "DEV_DEPLOY_WEBHOOK not set. Add it in repo Secrets (Settings → Secrets → Actions) with your host's deploy webhook URL (e.g. Render Deploy Hook, Railway webhook) to enable automatic dev deploys."
          fi
