repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: gitstream-cm-validate
        name: gitStream .cm validate
        entry: python scripts/run_local_hook.py gitstream-cm-validate
        language: system
        files: '\.cm$'
      - id: spectacular-schema
        name: drf-spectacular schema.yaml
        entry: python scripts/run_local_hook.py spectacular-schema
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest changed tests
        entry: python scripts/run_local_hook.py pytest-changed
        language: system
        files: '(^tests/.*\.py$|^test_.*\.py$)'
        pass_filenames: true
      - id: commit-message-bhb
        name: commit message [BHB-XX]
        entry: python scripts/run_local_hook.py commit-message-bhb
        language: system
        stages: [commit-msg]
        pass_filenames: true
