repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: gitstream-cm-validate
        name: gitStream .cm validate
        entry: bash -c 'if [ -d .venv ]; then . .venv/bin/activate; fi; python3 scripts/validate_gitstream_cm.py "$@"'
        language: system
        files: '\.cm$'
      - id: spectacular-schema
        name: drf-spectacular schema.yml
        entry: bash -c 'if [ -d .venv ]; then . .venv/bin/activate; fi; python3 manage.py spectacular --file schema.yml'
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: bash -c 'if [ -d .venv ]; then . .venv/bin/activate; fi; python3 -m pytest'
        language: system
        pass_filenames: false
      - id: commit-message-bhb
        name: commit message [BHB-XX]
        entry: bash -c 'head -1 "$0" | grep -qE "^\[BHB-[0-9]+\] " || { echo "Commit message must match [BHB-XX] description"; exit 1; }'
        language: system
        stages: [commit-msg]
        pass_filenames: true
