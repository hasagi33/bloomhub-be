# Local Postgres for development (no Neon required on your machine)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bloomhub
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bloomhub
    ports:
      - "3333:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
