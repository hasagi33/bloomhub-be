openapi: 3.0.3
info:
  title: BloomHub Backend API
  version: 1.0.0
  description: BloomHub internal HR platform API. Auth via JWT (login/register, then
    Bearer token).
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: List of available API endpoints.
      tags:
      - API Root
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIRootResponse'
          description: ''
  /api/admin/upload-role-permissions/:
    post:
      operationId: admin_upload_role_permissions_create
      description: 'Upload a CSV to set role permissions. Staff/superuser only. CSV:
        role_id, module_name, feature_action, permission (YES/NO), operation_type
        (override/add/remove/merge).'
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadRolePermissionsResponse'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assets/:
    get:
      operationId: assets_list
      description: Get list of all assets with filtering options
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
          description: ''
    post:
      operationId: assets_create
      description: Create a new asset
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
  /api/assets/{id}/:
    get:
      operationId: assets_retrieve
      description: Get, update, or delete a specific asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assets_update
      description: Update an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assets_destroy
      description: Delete an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/:
    get:
      operationId: assignments_list
      description: Get list of all assignments with filtering options
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
          description: ''
    post:
      operationId: assignments_create
      description: Create a new assignment
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
  /api/assignments/{id}/:
    get:
      operationId: assignments_retrieve
      description: Get, update, or delete a specific assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assignments_update
      description: Update an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assignments_destroy
      description: Delete an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/{id}/return/:
    post:
      operationId: assignments_return_create
      description: Return an assigned asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Login with email and password. Returns JWT refresh, access, and
        user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: 'Blacklist the refresh token. Send JSON: { "refresh": "<refresh_token>"
        }.'
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '205':
          description: No response body
        '400':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: Get current authenticated user profile. Requires Bearer token.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: 'Refresh access token. Send JSON: { "refresh": "<refresh_token>"
        }. Returns new access + user.'
      tags:
      - Auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Register a new user. Returns JWT refresh, access, and user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
  /api/replacement-logs/:
    get:
      operationId: replacement_logs_list
      description: Get list of all replacement logs with filtering options
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReplacementLog'
          description: ''
    post:
      operationId: replacement_logs_create
      description: Create a new replacement log
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '400':
          description: No response body
  /api/replacement-logs/{id}/:
    get:
      operationId: replacement_logs_retrieve
      description: Get, update, or delete a specific replacement log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '404':
          description: No response body
    put:
      operationId: replacement_logs_update
      description: Update a replacement log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: replacement_logs_destroy
      description: Delete a replacement log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/user-profiles/:
    get:
      operationId: user_profiles_list
      description: Get list of user profiles for assignment purposes
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'
          description: ''
components:
  schemas:
    APIRootResponse:
      type: object
      description: Response shape for GET /api/.
      properties:
        message:
          type: string
        endpoints:
          description: Nested map of endpoint names to paths or options.
      required:
      - endpoints
      - message
    Asset:
      type: object
      description: Serializer for Asset model
      properties:
        id:
          type: integer
          readOnly: true
        asset_id:
          type: string
          description: Unique identifier for the asset
          maxLength: 50
        name:
          type: string
          description: Asset name/type
          maxLength: 200
        condition:
          allOf:
          - $ref: '#/components/schemas/ConditionEnum'
          default: good
          description: |-
            Current condition of the asset

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
        warranty_until:
          type: string
          format: date
          nullable: true
          description: Warranty expiration date
        purchase_date:
          type: string
          format: date
          description: Date when the asset was purchased
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: active
          description: |-
            Current status of the asset

            * `active` - Active
            * `lost` - Lost
            * `returned` - Returned
            * `damaged` - Damaged
        serial_number:
          type: string
          nullable: true
          description: Manufacturer serial number
          maxLength: 100
        model:
          type: string
          nullable: true
          description: Asset model
          maxLength: 100
        manufacturer:
          type: string
          nullable: true
          description: Asset manufacturer
          maxLength: 100
        purchase_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Purchase price of the asset
        description:
          type: string
          nullable: true
          description: Additional description or notes
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        current_assignment:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        is_under_warranty:
          type: boolean
          readOnly: true
        is_available:
          type: boolean
          readOnly: true
      required:
      - asset_id
      - created_at
      - current_assignment
      - id
      - is_available
      - is_under_warranty
      - name
      - purchase_date
      - updated_at
    AssetCreateRequest:
      type: object
      description: Simplified serializer for creating assets
      properties:
        asset_id:
          type: string
          minLength: 1
          description: Unique identifier for the asset
          maxLength: 50
        name:
          type: string
          minLength: 1
          description: Asset name/type
          maxLength: 200
        condition:
          allOf:
          - $ref: '#/components/schemas/ConditionEnum'
          default: good
          description: |-
            Current condition of the asset

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
        warranty_until:
          type: string
          format: date
          nullable: true
          description: Warranty expiration date
        purchase_date:
          type: string
          format: date
          description: Date when the asset was purchased
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: active
          description: |-
            Current status of the asset

            * `active` - Active
            * `lost` - Lost
            * `returned` - Returned
            * `damaged` - Damaged
        serial_number:
          type: string
          nullable: true
          description: Manufacturer serial number
          maxLength: 100
        model:
          type: string
          nullable: true
          description: Asset model
          maxLength: 100
        manufacturer:
          type: string
          nullable: true
          description: Asset manufacturer
          maxLength: 100
        purchase_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Purchase price of the asset
        description:
          type: string
          nullable: true
          description: Additional description or notes
      required:
      - asset_id
      - name
      - purchase_date
    AssetRequest:
      type: object
      description: Serializer for Asset model
      properties:
        asset_id:
          type: string
          minLength: 1
          description: Unique identifier for the asset
          maxLength: 50
        name:
          type: string
          minLength: 1
          description: Asset name/type
          maxLength: 200
        condition:
          allOf:
          - $ref: '#/components/schemas/ConditionEnum'
          default: good
          description: |-
            Current condition of the asset

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
        warranty_until:
          type: string
          format: date
          nullable: true
          description: Warranty expiration date
        purchase_date:
          type: string
          format: date
          description: Date when the asset was purchased
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: active
          description: |-
            Current status of the asset

            * `active` - Active
            * `lost` - Lost
            * `returned` - Returned
            * `damaged` - Damaged
        serial_number:
          type: string
          nullable: true
          description: Manufacturer serial number
          maxLength: 100
        model:
          type: string
          nullable: true
          description: Asset model
          maxLength: 100
        manufacturer:
          type: string
          nullable: true
          description: Asset manufacturer
          maxLength: 100
        purchase_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Purchase price of the asset
        description:
          type: string
          nullable: true
          description: Additional description or notes
      required:
      - asset_id
      - name
      - purchase_date
    Assignment:
      type: object
      description: Serializer for Assignment model
      properties:
        id:
          type: integer
          readOnly: true
        asset:
          type: integer
          description: Asset being assigned
        employee:
          type: integer
          description: Employee receiving the asset
        assigned_at:
          type: string
          format: date-time
          readOnly: true
          description: When the asset was assigned
        returned_at:
          type: string
          format: date-time
          nullable: true
          description: When the asset was returned (optional)
        assigned_by:
          type: integer
          nullable: true
          description: Who made the assignment
        return_condition:
          nullable: true
          description: |-
            Condition when returned

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
          oneOf:
          - $ref: '#/components/schemas/ReturnConditionEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        notes:
          type: string
          nullable: true
          description: Additional notes about the assignment
        asset_details:
          allOf:
          - $ref: '#/components/schemas/Asset'
          readOnly: true
        employee_details:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        assigned_by_details:
          allOf:
          - $ref: '#/components/schemas/UserProfile'
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        duration_days:
          type: integer
          nullable: true
          readOnly: true
      required:
      - asset
      - asset_details
      - assigned_at
      - assigned_by_details
      - duration_days
      - employee
      - employee_details
      - id
      - is_active
    AssignmentCreateRequest:
      type: object
      description: Simplified serializer for creating assignments
      properties:
        asset:
          type: integer
          description: Asset being assigned
        employee:
          type: integer
          description: Employee receiving the asset
        assigned_by:
          type: integer
          nullable: true
          description: Who made the assignment
        notes:
          type: string
          nullable: true
          description: Additional notes about the assignment
      required:
      - asset
      - employee
    AssignmentRequest:
      type: object
      description: Serializer for Assignment model
      properties:
        asset:
          type: integer
          description: Asset being assigned
        employee:
          type: integer
          description: Employee receiving the asset
        returned_at:
          type: string
          format: date-time
          nullable: true
          description: When the asset was returned (optional)
        assigned_by:
          type: integer
          nullable: true
          description: Who made the assignment
        return_condition:
          nullable: true
          description: |-
            Condition when returned

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
          oneOf:
          - $ref: '#/components/schemas/ReturnConditionEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        notes:
          type: string
          nullable: true
          description: Additional notes about the assignment
      required:
      - asset
      - employee
    AssignmentReturnRequest:
      type: object
      description: Serializer for returning assets
      properties:
        return_condition:
          nullable: true
          description: |-
            Condition when returned

            * `excellent` - Excellent
            * `good` - Good
            * `fair` - Fair
            * `poor` - Poor
            * `damaged` - Damaged
          oneOf:
          - $ref: '#/components/schemas/ReturnConditionEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        notes:
          type: string
          nullable: true
          description: Additional notes about the assignment
    BlankEnum:
      enum:
      - ''
    ConditionEnum:
      enum:
      - excellent
      - good
      - fair
      - poor
      - damaged
      type: string
      description: |-
        * `excellent` - Excellent
        * `good` - Good
        * `fair` - Fair
        * `poor` - Poor
        * `damaged` - Damaged
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    NullEnum:
      enum:
      - null
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 1
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - password
      - password_confirm
      - username
    ReplacementLog:
      type: object
      description: Serializer for ReplacementLog model
      properties:
        id:
          type: integer
          readOnly: true
        asset:
          type: integer
          description: Asset that was replaced
        reason:
          type: string
          description: Reason for replacement
        date:
          type: string
          format: date-time
          readOnly: true
          description: When the replacement occurred
        replaced_by:
          type: integer
          nullable: true
          description: Who performed the replacement
        replacement_asset:
          type: integer
