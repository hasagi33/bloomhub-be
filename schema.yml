openapi: 3.0.3
info:
  title: BloomHub Backend API
  version: 1.0.0
  description: BloomHub internal HR platform API. Auth via JWT (login/register, then
    Bearer token).
paths:
  /api/:
    get:
      operationId: root_retrieve
      description: List of available API endpoints.
      tags:
      - API Root
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIRootResponse'
          description: ''
  /api/admin/upload-role-permissions/:
    post:
      operationId: admin_upload_role_permissions_create
      description: 'Upload a CSV to set role permissions. Staff/superuser only. CSV:
        role_id, module_name, feature_action, permission (YES/NO), operation_type
        (override/add/remove/merge).'
      tags:
      - Admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadRolePermissionsResponse'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/assets/:
    get:
      operationId: assets_list
      description: Get list of all assets with filtering options
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, lost, returned, damaged)
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
          description: ''
    post:
      operationId: assets_create
      description: Create a new asset
      parameters:
      - in: query
        name: available
        schema:
          type: boolean
        description: Filter by availability (true/false)
      - in: query
        name: condition
        schema:
          type: string
        description: Filter by asset condition (excellent, good, fair, poor, damaged)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by asset status (active, lost, returned, damaged)
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
  /api/assets/{id}/:
    get:
      operationId: assets_retrieve
      description: Get a specific asset by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assets_update
      description: Update an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assets_destroy
      description: Delete an asset
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/:
    get:
      operationId: assignments_list
      description: Get list of all assignments with filtering options
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
          description: ''
    post:
      operationId: assignments_create
      description: Create a new assignment
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active assignments (true/false)
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: employee
        schema:
          type: integer
        description: Filter by employee ID
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
  /api/assignments/{id}/:
    get:
      operationId: assignments_retrieve
      description: Get a specific assignment by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '404':
          description: No response body
    put:
      operationId: assignments_update
      description: Update an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: assignments_destroy
      description: Delete an assignment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/assignments/{id}/return/:
    post:
      operationId: assignments_return_create
      description: Return an assigned asset (mark as returned and set condition)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssignmentReturnRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
  /api/auth/google/exchange/:
    post:
      operationId: auth_google_exchange_create
      description: Exchange a Google ID token for native JWT access/refresh tokens.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleExchangeRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Login with email and password. Returns JWT refresh, access, and
        user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: 'Blacklist the refresh token. Send JSON: { "refresh": "<refresh_token>"
        }.'
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '205':
          description: No response body
        '400':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      description: Get current authenticated user profile. Requires Bearer token.
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/profile/avatar/:
    post:
      operationId: auth_profile_avatar_create
      description: Upload a new avatar for the current user. Accepts multipart/form-data
        with an `avatar` image file (max 5 MB). Stores the file via the configured
        storage backend (Cloudflare R2 when credentials are set). Returns the updated
        user object including the new `avatar_url`.
      tags:
      - Auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '400':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: 'Refresh access token. Send JSON: { "refresh": "<refresh_token>"
        }. Returns new access + user.'
      tags:
      - Auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Register a new user. Returns JWT refresh, access, and user.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
        '400':
          description: No response body
  /api/employees/:
    get:
      operationId: employees_list
      description: Returns all profiles for HR/Admin; non-admin users only see their
        own. Supports filtering, search, and ordering via query parameters.
      summary: List employee profiles
      parameters:
      - in: query
        name: department
        schema:
          type: string
        description: Exact match on department.
      - in: query
        name: employment_status
        schema:
          type: string
        description: Exact match on employment status (e.g. active, inactive).
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active flag.
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Order results. Prefix with `-` for descending. Allowed: full_name,
          start_date, created_at.'
      - in: query
        name: role__name
        schema:
          type: string
        description: Exact match on related role name.
      - in: query
        name: search
        schema:
          type: string
        description: Search across full name, email, username, and employee id (full_name,
          email_address, user__username, employee_id).
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeProfile'
          description: ''
    post:
      operationId: employees_create
      description: Creates a `User` and linked `UserProfile`. HR/Admin only. A random
        password is generated server-side for the new account.
      summary: Create employee profile
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/employees/{id}/:
    get:
      operationId: employees_retrieve
      description: Fetch one profile by id. HR/Admin any id; others only their own.
      summary: Retrieve employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '403':
          description: No response body
        '404':
          description: No response body
    put:
      operationId: employees_update
      description: Full update (PUT). HR/Admin can edit any profile; others read-only.
      summary: Replace employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
    patch:
      operationId: employees_partial_update
      description: Partial update (PATCH). Same permission rules as PUT.
      summary: Patch employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: employees_destroy
      description: Does not remove the profile row. Deletes avatar and document files,
        removes related assignments and salary rows, clears PII, marks the profile
        inactive, and anonymizes plus deactivates the linked Django `User`. HR/Admin
        only for arbitrary profiles.
      summary: Soft-delete employee profile
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '403':
          description: No response body
        '404':
          description: No response body
  /api/employees/{id}/update-permissions/:
    post:
      operationId: employees_update_permissions_create
      description: Replaces the profile's stored permissions string with the given
        binary bitmap. HR/Admin only.
      summary: Override permissions bitmap
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '403':
          description: No response body
  /api/employees/{id}/update-role/:
    post:
      operationId: employees_update_role_create
      description: Sets `role` and recomputes the permissions bitmap from that role's
        permissions. HR/Admin only.
      summary: Update employee role
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Employee Profile.
        required: true
      tags:
      - Employee Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfile'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
        '403':
          description: No response body
  /api/replacement-logs/:
    get:
      operationId: replacement_logs_list
      description: Get list of all replacement logs with filtering options
      parameters:
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: replaced_by
        schema:
          type: integer
        description: Filter by user who performed replacement
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReplacementLog'
          description: ''
    post:
      operationId: replacement_logs_create
      description: Create a new replacement log
      parameters:
      - in: query
        name: asset
        schema:
          type: integer
        description: Filter by asset ID
      - in: query
        name: replaced_by
        schema:
          type: integer
        description: Filter by user who performed replacement
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '400':
          description: No response body
  /api/replacement-logs/{id}/:
    get:
      operationId: replacement_logs_retrieve
      description: Get a specific replacement log by ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '404':
          description: No response body
    put:
      operationId: replacement_logs_update
      description: Update a replacement log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReplacementLogRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplacementLog'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: replacement_logs_destroy
      description: Delete a replacement log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/user-profiles/:
    get:
      operationId: user_profiles_list
      description: Get list of user profiles for assignment purposes
      tags:
      - Asset Management
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'
          description: ''
components:
  schemas:
    APIRootResponse:
      type: object
      description: Response shape for GET /api/.
      properties:
        message:
          type: string
        endpoints:
          description: Nested map of endpoint names to paths or options.
      required:
      - endpoints
      - message
    Asset:
      type: object
      description: Serializer for Asset model
      properties:
        id:
          type: integer
          readOnly: true
        asset_id:
          type: string
          description: Unique identifier for the asset
          maxLength: 50
        name:
          type: string
          description: Asset name/type
          maxLength: 200
        condition:
